<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>裝備合成挑戰 - Gear Alchemy</title>
    <style>
        :root {
            --primary: #4e44ff;
            --secondary: #ffcf00;
            --bg: #1a1a2e;
            --text: #ffffff;
            --highlight: #00f2ff;
        }

        body {
            font-family: 'Arial Rounded MT Bold', 'Helvetica', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            width: 95%;
            max-width: 900px;
            background: #16213e;
            border: 5px solid var(--primary);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 50px rgba(78, 68, 255, 0.4);
        }

        #start-screen, #game-screen, #result-screen { display: none; }
        .active-section { display: block !important; }

        .title { font-size: 4rem; color: var(--secondary); text-shadow: 4px 4px #ff4e00; margin-bottom: 20px; }
        
        .selection-area { display: flex; justify-content: space-around; gap: 20px; margin-top: 20px; }
        .category { flex: 1; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; border: 2px solid #333; }
        .item-list { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        
        .item-btn {
            background: #0f3460; color: white; border: 2px solid var(--primary);
            padding: 15px 5px; border-radius: 12px; cursor: pointer; font-size: 1.2rem; transition: 0.3s;
        }
        .item-btn.active { background: var(--primary); transform: scale(1.05); box-shadow: 0 0 15px var(--primary); }

        .result-box {
            background: linear-gradient(145deg, #16213e, #0f3460);
            padding: 40px; border-radius: 25px; margin: 25px 0;
            border: 4px solid var(--secondary);
        }

        .gear-name-container { margin-bottom: 20px; }
        .gear-name-en { font-size: 4.5rem; color: var(--secondary); font-weight: bold; line-height: 1.1; }
        .gear-name-ch { font-size: 2.5rem; color: #ff9d00; margin-top: 10px; display: none; }
        
        .gear-desc-en { 
            font-size: 2.2rem; 
            color: var(--highlight); 
            background: rgba(0,0,0,0.4);
            padding: 25px;
            border-radius: 15px;
            margin: 25px 0;
            line-height: 1.4;
            border-left: 12px solid var(--secondary);
            text-align: left;
        }

        .translation-box { 
            font-size: 1.8rem; color: #eee; margin-top: 15px; display: none; 
            padding: 15px; background: rgba(255,255,255,0.1); border-radius: 10px;
            border: 1px dashed #777;
        }

        .btn-main {
            background: var(--secondary); color: #000; border: none;
            padding: 20px 50px; font-size: 1.8rem; font-weight: bold;
            border-radius: 60px; cursor: pointer; box-shadow: 0 6px 0 #b89500; margin: 10px;
        }

        .btn-tool {
            background: #555; color: white; border: none; padding: 12px 25px;
            border-radius: 12px; cursor: pointer; font-size: 1.3rem; margin: 10px;
        }

        .speaker-btn {
            font-size: 3.5rem; background: var(--primary); color: white;
            border: none; border-radius: 50%; width: 90px; height: 90px;
            cursor: pointer; transition: 0.3s; margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="start-screen" class="active-section">
            <h1 class="title">裝備合成挑戰 🧪</h1>
            <p style="font-size: 1.8rem;">組合不同的單字，創造屬於你的傳說裝備！</p>
            <button class="btn-main" onclick="showScreen('game-screen')">START 開始挑戰</button>
        </div>

        <div id="game-screen">
            <h2 style="color: var(--secondary); font-size: 2.2rem;">Pick 2 Ingredients!</h2>
            <div class="selection-area">
                <div class="category">
                    <h3>Nature 素材 A</h3>
                    <div class="item-list" id="list-a"></div>
                </div>
                <div class="category">
                    <h3>Items 素材 B</h3>
                    <div class="item-list" id="list-b"></div>
                </div>
            </div>
            <div style="margin-top: 30px;">
                <button class="btn-main" id="merge-btn" style="display:none;" onclick="mergeGears()">MERGE 合成!</button>
            </div>
        </div>

        <div id="result-screen">
            <div id="loading-area" style="font-size: 3rem; color: var(--secondary); margin: 50px;">🔮 Mixing Magic... 🔮</div>
            <div id="result-content" style="display:none;">
                <div class="result-box">
                    <button class="speaker-btn" onclick="speakResult()">🔊</button>
                    <div class="gear-name-container">
                        <div class="gear-name-en" id="res-name-en"></div>
                        <div class="gear-name-ch" id="res-name-ch"></div>
                    </div>
                    <div class="gear-desc-en" id="res-desc-en"></div>
                    <button class="btn-tool" id="trans-btn" onclick="toggleTranslation()">Show Translation (看中文翻譯)</button>
                    <div class="translation-box" id="translation-text"></div>
                </div>
                <button class="btn-main" onclick="resetGame()">TRY AGAIN 再次挑戰</button>
            </div>
        </div>
    </div>

    <script>
        const dataA = [
            {en: "Fire", ch: "火焰", icon: "🔥", desc: "It is very hot and can melt ice!", trans: "這非常燙，而且可以融化冰塊！"},
            {en: "Ice", ch: "冰霜", icon: "❄️", desc: "It is cold and can freeze time!", trans: "這很冰冷，而且可以凍結時間！"},
            {en: "Wind", ch: "疾風", icon: "💨", desc: "It is very light and you can fly!", trans: "這非常輕盈，而且你可以飛起來！"},
            {en: "Flash", ch: "閃電", icon: "⚡", desc: "It is as fast as lighting!", trans: "這跟閃電一樣快速！"},
            {en: "Super", ch: "超級", icon: "💎", desc: "It gives you very big power!", trans: "它會給你非常強大的力量！"},
            {en: "Flying", ch: "飛行", icon: "🕊️", desc: "It can fly over the mountains!", trans: "它可以飛過高山！"},
            {en: "Rainbow", ch: "彩虹", icon: "🌈", desc: "It is beautiful and colorful!", trans: "它既漂亮又充滿色彩！"},
            {en: "Golden", ch: "黃金", icon: "💰", desc: "It is very shiny and strong!", trans: "它非常閃亮且強大！"}
        ];

        const dataB = [
            {en: "Bike", ch: "腳踏車", icon: "🚲"}, {en: "Hat", ch: "帽子", icon: "🎩"},
            {en: "Shoes", ch: "鞋子", icon: "👟"}, {en: "Backpack", ch: "背包", icon: "🎒"},
            {en: "Glasses", ch: "眼鏡", icon: "👓"}, {en: "Watch", ch: "手錶", icon: "⌚"},
            {en: "Umbrella", ch: "雨傘", icon: "☂️"}, {en: "Bottle", ch: "水壺", icon: "🍼"}
        ];

        let selA = null, selB = null;

        function showScreen(id) {
            document.querySelectorAll('#game-container > div').forEach(div => div.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
            if(id === 'game-screen') initMenu();
        }

        function initMenu() {
            const listA = document.getElementById('list-a');
            const listB = document.getElementById('list-b');
            if(listA.innerHTML !== "") return;

            dataA.forEach(item => {
                const b = document.createElement('button');
                b.className = 'item-btn';
                b.innerHTML = `${item.icon}<br>${item.en}`;
                b.onclick = () => {
                    document.querySelectorAll('#list-a .item-btn').forEach(btn => btn.classList.remove('active'));
                    b.classList.add('active'); selA = item; check();
                };
                listA.appendChild(b);
            });

            dataB.forEach(item => {
                const b = document.createElement('button');
                b.className = 'item-btn';
                b.innerHTML = `${item.icon}<br>${item.en}`;
                b.onclick = () => {
                    document.querySelectorAll('#list-b .item-btn').forEach(btn => btn.classList.remove('active'));
                    b.classList.add('active'); selB = item; check();
                };
                listB.appendChild(b);
            });
        }

        function check() { if(selA && selB) document.getElementById('merge-btn').style.display = 'inline-block'; }

        function mergeGears() {
            showScreen('result-screen');
            setTimeout(() => {
                document.getElementById('loading-area').style.display = 'none';
                document.getElementById('result-content').style.display = 'block';
                document.getElementById('res-name-en').innerText = `${selA.en} ${selB.en} ${selB.icon}`;
                document.getElementById('res-name-ch').innerText = `[ ${selA.ch}${selB.ch} ]`;
                document.getElementById('res-desc-en').innerText = selA.desc;
                document.getElementById('translation-text').innerText = selA.trans;
                speakResult();
            }, 1500);
        }

        function toggleTranslation() {
            const t = document.getElementById('translation-text');
            const c = document.getElementById('res-name-ch');
            const btn = document.getElementById('trans-btn');
            const isHidden = (t.style.display === 'none' || t.style.display === '');
            t.style.display = isHidden ? 'block' : 'none';
            c.style.display = isHidden ? 'block' : 'none';
            btn.innerText = isHidden ? "Hide Translation (隱藏中文)" : "Show Translation (看中文翻譯)";
        }

        function speakResult() {
            const msg = new SpeechSynthesisUtterance();
            msg.text = `You got ${selA.en} ${selB.en}. ${selA.desc}`;
            msg.lang = 'en-US';
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        function resetGame() {
            selA = null; selB = null;
            document.querySelectorAll('.item-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('merge-btn').style.display = 'none';
            document.getElementById('translation-text').style.display = 'none';
            document.getElementById('res-name-ch').style.display = 'none';
            document.getElementById('trans-btn').innerText = "Show Translation (看中文翻譯)";
            document.getElementById('loading-area').style.display = 'block';
            document.getElementById('result-content').style.display = 'none';
            showScreen('game-screen');
        }
    </script>
</body>
</html>
